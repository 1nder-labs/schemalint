name: release-please

# Maintains a "Release PR" on main (version bumps across the Cargo workspace, the npm
# package, and the Python wheel + CHANGELOG) from Conventional Commit history. When that
# Release PR is merged, release-please tags v<version>, then the final step dispatches
# release.yml at that tag to build binaries + publish (crates.io / npm via OIDC / PyPI /
# GitHub Release).
#
# No PAT required: release-please authenticates with the default GITHUB_TOKEN, and
# workflow_dispatch is the one cross-workflow trigger that DOES fire from GITHUB_TOKEN
# (a plain tag push from GITHUB_TOKEN would not trigger release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        # `token` defaults to ${{ github.token }} — no PAT needed.
        # config + manifest are read from the repo root by default
        # (release-please-config.json + .release-please-manifest.json).

      - name: Dispatch the build + publish pipeline for the new tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${{ steps.release.outputs.tag_name }}"
