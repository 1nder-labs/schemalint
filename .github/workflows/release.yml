#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.
#
# --- Adapted with full release pipeline ---
# Adds: build-wheel, smoke-test (ubuntu/macos/windows), publish-crates,
# publish-pypi, create-github-release, smoke-npm, publish-npm.
# The cargo-dist host job is superseded by create-github-release which
# runs after crate and PyPI publishes to ensure the release exists
# before the npm wrapper auto-downloads from it.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # ==========================================================================
  # cargo-dist jobs (generated by `dist init`, kept intact)
  # ==========================================================================

  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # ==========================================================================
  # Custom release pipeline jobs
  #
  # Dependency chain:
  #   [dist builds] --> build-wheel --> smoke-test
  #       --> publish-crates + publish-pypi
  #       --> create-github-release
  #       --> smoke-npm
  #       --> publish-npm
  #
  # All custom jobs gate on startsWith(github.ref, 'refs/tags/v') so they
  # only execute on tag pushes, not on PR plan-only runs.
  # ==========================================================================

  # Build Python wheel via maturin
  build-wheel:
    needs:
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/schemalint-python
          command: build
          args: --release --out ../../dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  # Smoke-test binaries on all three platforms
  smoke-test:
    needs:
      - build-local-artifacts
      - build-global-artifacts
      - build-wheel
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-*
          path: dist-artifacts
          merge-multiple: true

      - name: Extract and smoke-test binary (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -e
          ARCHIVE="schemalint-${{ matrix.target }}.${{ matrix.ext }}"
          echo "Extracting: $ARCHIVE"
          tar xzf "dist-artifacts/$ARCHIVE"
          chmod +x schemalint
          echo "Running: schemalint --version"
          VERSION_OUTPUT=$(./schemalint --version)
          echo "$VERSION_OUTPUT"
          echo "Running: schemalint check (minimal schema)"
          echo '{"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]}' > test-schema.json
          ./schemalint check test-schema.json --profile openai

      - name: Extract and smoke-test binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archive = "schemalint-${{ matrix.target }}.${{ matrix.ext }}"
          Write-Host "Extracting: $archive"
          Expand-Archive -Path "dist-artifacts/$archive" -DestinationPath .
          Write-Host "Running: schemalint --version"
          $versionOutput = & ./schemalint.exe --version
          Write-Host $versionOutput
          Write-Host "Running: schemalint check (minimal schema)"
          '{"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]}' | Out-File -Encoding ascii test-schema.json
          & ./schemalint.exe check test-schema.json --profile openai

      - name: Download wheel artifact (for wheel smoke test)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Smoke-test Python wheel (ubuntu only)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -e
          pip install dist/*.whl
          schemalint --version
          echo '{"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]}' > test-schema.json
          schemalint check test-schema.json --profile openai

  # Publish Rust crates to crates.io
  publish-crates:
    needs:
      - smoke-test
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish schemalint-profiles (dependency first)
        run: |
          for i in 1 2 3; do
            cargo publish -p schemalint-profiles --no-verify && break
            echo "cargo publish attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish schemalint
        run: |
          for i in 1 2 3; do
            cargo publish -p schemalint --no-verify && break
            echo "cargo publish attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish Python wheel to PyPI
  publish-pypi:
    needs:
      - build-wheel
      - smoke-test
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/schemalint/
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
          skip-existing: true

  # Create GitHub Release with all artifacts
  # Runs even if publish-crates or publish-pypi fails (binary release is still viable).
  create-github-release:
    needs:
      - smoke-test
      - publish-crates
      - publish-pypi
    if: ${{ always() && needs.smoke-test.result == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-*
          path: release-artifacts
          merge-multiple: true

      - name: Download global artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-global
          path: release-artifacts
          merge-multiple: true

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: release-artifacts

      - name: Cleanup manifest files
        run: |
          rm -f release-artifacts/*-dist-manifest.json

      - name: Install git-cliff
        id: git-cliff
        run: |
          if curl -fsSLO "https://github.com/orhun/git-cliff/releases/download/v2.9.0/git-cliff-2.9.0-x86_64-unknown-linux-gnu.tar.gz"; then
            tar xzf git-cliff-2.9.0-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin git-cliff
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes with git-cliff
        if: ${{ steps.git-cliff.outputs.installed == 'true' }}
        run: |
          git cliff --tag "${{ github.ref_name }}" --output RELEASE_NOTES.md
          echo "Generated release notes:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release (with git-cliff notes)
        if: ${{ steps.git-cliff.outputs.installed == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: false

      - name: Create GitHub Release (auto-generated notes)
        if: ${{ steps.git-cliff.outputs.installed != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false

  # Smoke-test npm wrapper auto-download (requires GitHub Release to exist)
  smoke-npm:
    needs:
      - create-github-release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    env:
      SCHEMALINT_CACHE_DIR: ${{ runner.temp }}/schemalint-cache
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pack npm package
        run: npm pack
        working-directory: npm/cli

      - name: Install packed package globally
        shell: bash
        run: npm install -g ./schemalint-cli-*.tgz
        working-directory: npm/cli

      - name: Smoke-test installed CLI
        shell: bash
        run: |
          schemalint --version
          echo '{"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]}' > test-schema.json
          schemalint check test-schema.json --profile openai

  # Publish all npm packages
  publish-npm:
    needs:
      - smoke-npm
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
      url: https://www.npmjs.com/package/@schemalint/cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build @schemalint/zod
        run: |
          npm ci
          npm run build
        working-directory: typescript/schemalint-zod

      - name: Publish @schemalint/cli
        run: |
          for i in 1 2 3; do
            npm publish --access public && break
            echo "npm publish attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: npm/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @schemalint/core
        run: |
          for i in 1 2 3; do
            npm publish --access public && break
            echo "npm publish attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: npm/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @schemalint/zod
        run: |
          for i in 1 2 3; do
            npm publish --access public && break
            echo "npm publish attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: typescript/schemalint-zod
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
