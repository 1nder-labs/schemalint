[package]
name = "schemalint"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Static analysis tool for JSON Schema compatibility with LLM structured-output providers"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
indexmap = "2.7"
linkme = "0.3"
clap = { version = "4.5", features = ["derive"] }
rayon = "1.10"
thiserror = "2.0"

[dev-dependencies]
insta = "1.42"
proptest = "1.6"
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.19"
schemalint-profiles = { path = "../schemalint-profiles" }

[[bench]]
name = "schemalint_benchmarks"
harness = false
