[provider]
name = "anthropic"
version = "2026-04-30"
endpoint = "https://api.anthropic.com/v1/messages"
model = "claude-sonnet-4-20250514"
behavior = "stripping"

# ============================================================================
# Accepted Keywords
# ============================================================================

[[keywords]]
name = "type"
behavior = "accept"
test_schema = '''
{ "type": "object", "properties": {} }
'''

[[keywords]]
name = "properties"
behavior = "accept"
test_schema = '''
{ "type": "object", "properties": { "name": { "type": "string" } } }
'''

[[keywords]]
name = "required"
behavior = "accept"
test_schema = '''
{ "type": "object", "properties": { "name": { "type": "string" } }, "required": ["name"] }
'''

[[keywords]]
name = "items"
behavior = "accept"
test_schema = '''
{ "type": "array", "items": { "type": "string" } }
'''

[[keywords]]
name = "enum"
behavior = "accept"
test_schema = '''
{ "type": "string", "enum": ["red", "green", "blue"] }
'''

[[keywords]]
name = "const"
behavior = "accept"
test_schema = '''
{ "const": "hello" }
'''

[[keywords]]
name = "anyOf"
behavior = "accept"
test_schema = '''
{ "type": "object", "anyOf": [ { "properties": { "x": { "type": "string" } } }, { "properties": { "y": { "type": "number" } } } ] }
'''

[[keywords]]
name = "allOf"
behavior = "accept"
test_schema = '''
{ "type": "object", "allOf": [ { "properties": { "name": { "type": "string" } } }, { "properties": { "age": { "type": "number" } } } ] }
'''

[[keywords]]
name = "$ref"
behavior = "accept"
test_schema = '''
{ "$defs": { "Name": { "type": "string" } }, "type": "object", "properties": { "name": { "$ref": "#/$defs/Name" } } }
'''

[[keywords]]
name = "$defs"
behavior = "accept"
test_schema = '''
{ "type": "object", "$defs": { "Address": { "type": "object", "properties": { "street": { "type": "string" } } } }, "properties": { "address": { "$ref": "#/$defs/Address" } } }
'''

[[keywords]]
name = "definitions"
behavior = "accept"
test_schema = '''
{ "type": "object", "definitions": { "Name": { "type": "string" } }, "properties": { "name": { "$ref": "#/definitions/Name" } } }
'''

[[keywords]]
name = "description"
behavior = "accept"
test_schema = '''
{ "type": "object", "description": "A test schema", "properties": {} }
'''

[[keywords]]
name = "title"
behavior = "accept"
test_schema = '''
{ "type": "object", "title": "Test Schema", "properties": {} }
'''

[[keywords]]
name = "default"
behavior = "accept"
test_schema = '''
{ "type": "string", "default": "hello" }
'''

[[keywords]]
name = "pattern"
behavior = "accept"
test_schema = '''
{ "type": "string", "pattern": "^[a-z]+$" }
'''

# ============================================================================
# Rejected Keywords (Anthropic strips, but truth marks as reject for conformance)
# ============================================================================

[[keywords]]
name = "minimum"
behavior = "reject"
test_schema = '''
{ "type": "number", "minimum": 0 }
'''
expected_error = "minimum is not supported by Anthropic"
expected_error_path = "/minimum"

