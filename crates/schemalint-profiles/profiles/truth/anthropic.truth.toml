# ============================================================================
# Structural Tests
# ============================================================================

[[structural_tests]]
limit_name = "require_additional_properties_false"
test_schema = '''
{ "type": "object", "additionalProperties": false, "properties": { "x": { "type": "string" } } }
'''
expected_behavior = "accept"

[[structural_tests]]
limit_name = "allof_with_ref"
test_schema = '''
{ "type": "object", "allOf": [ { "$ref": "#/$defs/Base" }, { "properties": { "extra": { "type": "string" } } } ], "$defs": { "Base": { "type": "object", "properties": { "id": { "type": "string" } } } } }
'''
expected_behavior = "reject"
expected_error_path = "/"
